<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login.title">Login - Brevity Companion</title>
    <style>
        :root { 
            --primary-bg: #FFFFFF; 
            --secondary-bg: #F5F5F5; 
            --accent-main: #111111; 
            --border: #E1E1E1; 
            --font: 'Segoe UI', sans-serif; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }
        body { background-color: var(--secondary-bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; min-height: 100dvh; padding: 24px 16px; }
        .auth-container { max-width: 400px; width: 100%; }
        
        .auth-container { background: var(--primary-bg); width: 100%; max-width: 400px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); text-align: center; }
        
        .subtitle { font-size: 0.9rem; color: #666; margin-bottom: 30px; }
        
        input[type="email"], input[type="password"] { width: 100%; padding: 12px 15px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; outline: none; }
        input[type="email"]:focus, input[type="password"]:focus { border-color: var(--accent-main); }
        
        .btn { width: 100%; padding: 14px; background: var(--accent-main); color: white; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn:hover { background: #333; transform: translateY(-2px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .switch-link { margin-top: 25px; font-size: 0.9rem; color: #666; }
        .switch-link a { color: var(--accent-main); font-weight: 600; text-decoration: none; }
        .switch-link a:hover { text-decoration: underline; }

        .header-group {
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mascot-gif {
            width: 260px;
            max-width: 70%;
            height: auto;
            margin-bottom: 10px;
            transition: width 0.3s ease;
        }

        @media (max-width: 768px) {
            .auth-container { padding: 32px 24px; }
            .mascot-gif { width: 40vw; }
        }

        @media (max-width: 500px) {
            .mascot-gif { width: 46vw; }
            .logo { font-size: 1.6rem; }
        }

        @media (max-width: 380px) {
            .mascot-gif { width: 50vw; }
        }

        .logo { font-size: 1.8rem; font-weight: 700; color: var(--accent-main); text-align: center; }

        /* Subtle Legal Compliance Footer */
        .legal-footer {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: #888;
            line-height: 1.4;
        }
        .legal-footer a { color: #666; text-decoration: none; font-weight: 600; }
        .legal-footer a:hover { text-decoration: underline; }
    </style>
    <!-- Include Supabase JS CDN UMD bundle + shared auth layer -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="theme.js"></script>
    <script src="i18n.js"></script>
    <script src="auth.js"></script>
</head>
<body>

    <div class="auth-container">
        <div class="header-group">
            <img src="https://pub-7ed39d8007834ea89e05df1ca891808c.r2.dev/tiger.apng" alt="Tiger Mascot" class="mascot-gif">
            <h1 class="logo" data-i18n="brand">Brevity Companion</h1>
        </div>

        <p class="subtitle" data-i18n="login.subtitle">Log in to continue your Korean journey</p>

        <input type="email" placeholder="Email Address" id="email" data-i18n-ph="login.email" required>
        <input type="password" placeholder="Password" id="password" data-i18n-ph="login.password" required>

        <button class="btn" id="loginBtn" onclick="handleLogin()" data-i18n="login.enter">Enter Platform</button>

        <p class="switch-link"><span data-i18n="login.newStudent">New student?</span> <a href="signup.html" data-i18n="login.createAccount">Create Account</a></p>

        <!-- Compliance session hyperlinks at the bottom -->
        <div class="legal-footer">
            <span data-i18n="login.legalFooter">By clicking Enter Platform, you acknowledge agreement to our</span>
            <a href="Terms.html" data-i18n="login.terms">Terms of Service</a> &amp;
            <a href="Privacy.html" data-i18n="login.privacy">Privacy Policy</a>.
        </div>
    </div>

    <script>
        // Supabase client comes from the shared auth.js (global supabaseClient).

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            if (!email || !password) {
                alert(t('login.fillCreds'));
                return;
            }

            try {
                loginBtn.disabled = true;
                loginBtn.innerText = t('login.authenticating');

                // Call Supabase Authentication Layer
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                // Auth is now handled entirely by the Supabase session
                // (see auth.js requireAuth), so there is no local flag to set.

                // Mirror the Supabase `is_admin` metadata flag into localStorage
                // so gate pages can read admin/infinite-KP status synchronously.
                if (window.applyAdminFlag) await window.applyAdminFlag(data.user);

                // Sync localized token metrics safely
                if (!localStorage.getItem('kimchi_points')) {
                    localStorage.setItem('kimchi_points', '5');
                }

                // Redirect directly to the platform workspace dashboard
                window.location.href = 'dashboard.html';

            } catch (err) {
                alert(t('login.failed') + err.message);
                loginBtn.disabled = false;
                loginBtn.innerText = t('login.enter');
            }
        }
    </script>
</body>
</html>
