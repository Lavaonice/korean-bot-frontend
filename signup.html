<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Brevity Companion</title>
    <style>
        :root { 
            --primary-bg: #FFFFFF; 
            --secondary-bg: #F8F9FA; 
            --accent-main: #111111; 
            --kp-color: #E63946;
            --border: #E1E1E1; 
            --font: 'Segoe UI', sans-serif; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }
        body { background-color: var(--secondary-bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .auth-container { background: var(--primary-bg); width: 100%; max-width: 420px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); text-align: center; }
        
        .subtitle { font-size: 0.9rem; color: #666; margin-bottom: 25px; }
        
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 12px 15px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; outline: none; }
        input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus { border-color: var(--accent-main); }
        
        /* Compliance Consent Layout */
        .compliance-wrapper {
            background: #FAFAFA;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }
        .consent-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
        }
        .consent-group:last-child { margin-bottom: 0; }
        .consent-checkbox {
            width: auto;
            margin-top: 3px;
            cursor: pointer;
            accent-color: var(--accent-main);
        }
        .consent-label {
            font-size: 0.78rem;
            color: #555;
            line-height: 1.4;
            cursor: pointer;
            user-select: none;
        }
        .consent-label a { color: var(--kp-color); text-decoration: none; font-weight: 600; }
        .consent-label a:hover { text-decoration: underline; }
        
        .btn { width: 100%; padding: 14px; background: var(--accent-main); color: white; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn:hover { background: #333; transform: translateY(-2px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .switch-link { margin-top: 20px; font-size: 0.9rem; color: #666; }
        .switch-link a { color: var(--accent-main); font-weight: 600; text-decoration: none; }
        .switch-link a:hover { text-decoration: underline; }

        .header-group {
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mascot-gif {
            width: 160px;
            height: auto;
            margin-bottom: 10px;
            transition: width 0.3s ease; 
        }

        @media (max-width: 500px) {
            .mascot-gif { width: 110px; }
        }

        .logo { font-size: 1.8rem; font-weight: 700; color: var(--accent-main); text-align: center; }
    </style>
    <!-- Include Supabase JS CDN UMD bundle -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="auth-container">
        <!-- Fixed Header Group Structural Layout -->
        <div class="header-group">
            
            <h1 class="logo">Brevity Companion</h1>
        </div>
        
        <p class="subtitle">Create an account to start practicing Korean</p>
        
        <input type="text" placeholder="Full Name" id="fullName" required>
        <input type="email" placeholder="Email Address" id="email" required>
        <input type="password" placeholder="Password (Min 6 chars)" id="password" required>
        <input type="password" placeholder="Confirm Password" id="confirmPassword" required>
        
        <!-- Enforced Compliance Blocks -->
        <div class="compliance-wrapper">
            <div class="consent-group">
                <input type="checkbox" id="age-consent" class="consent-checkbox">
                <label for="age-consent" class="consent-label">
                    I represent and warrant that I am <b>18 years of age or older</b> and possess the full legal capacity to accept our platform's <a href="Terms.html" target="_blank">Terms of Service</a>.
                </label>
            </div>
            <div class="consent-group">
                <input type="checkbox" id="ai-consent" class="consent-checkbox">
                <label for="ai-consent" class="consent-label">
                   I consent to my voice recordings and text inputs being transmitted and processed by third-party AI models (STT speech capture, TTS voice streams, and LLM evaluations) to handle engine feedback per our <a href="Privacy.html" target="_blank">Privacy Policy</a>.
                </label>
            </div>
        </div>
        
        <button class="btn" id="submitBtn" onclick="handleSignup()">Register Account</button>
        
        <p class="switch-link">Already a student? <a href="index.html">Log In</a></p>
    </div>

    <script>
        // 1. Initialize Connection using details from Supabase dashboard settings
        const SUPABASE_URL = "https://zysltznpsldeuxqtsejc.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_awRlrxnsIcR9IfoODAJKzQ_iaTKlAXN"; 
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleSignup() {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const ageConsent = document.getElementById('age-consent').checked;
            const aiConsent = document.getElementById('ai-consent').checked;
            const submitBtn = document.getElementById('submitBtn');

            // Form Validations
            if (!fullName || !email || !password || !confirmPassword) {
                alert("Please fill out all identity fields.");
                return;
            }
            if (password !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }
            if (password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            // Compliance Gate Checks
            if (!ageConsent || !aiConsent) {
                alert("You must check both validation boxes to confirm your age status and accept the AI data routing disclosures.");
                return;
            }

            try {
                submitBtn.disabled = true;
                submitBtn.innerText = "Processing registration...";

                // 2. Call Supabase Auth API
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            age_verified_18_plus: true,
                            ai_consent_granted: true,
                            consent_timestamp: new Date().toISOString()
                        }
                    }
                });

                if (error) throw error;

                // 3. Initialize Client Points Local Economy
                localStorage.setItem('kimchi_points', '5');
                localStorage.setItem('ai_consent_granted', 'true');
                localStorage.setItem('ai_consent_timestamp', new Date().toISOString());

                alert("Registration highly successful! Please check your email inbox to confirm your registration verification link.");
                window.location.href = 'index.html';

            } catch (err) {
                alert("Registration failed: " + err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "Register Account";
            }
        }
    </script>
</body>
</html>
