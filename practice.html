<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brevity Companion - Practice Setup</title>
<style>
    :root {
        --primary-bg: #FFFFFF; --secondary-bg: #F8F9FA;
        --text-primary: #111111; --text-secondary: #555555;
        --accent-main: #34495E; --accent-hover: #2C3E50;
        --border-color: #E1E1E1; --kp-color: #E63946;
        --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-family); color: var(--text-primary); background-color: var(--secondary-bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
    .container { width: 100%; max-width: 650px; background-color: var(--primary-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 30px; border-bottom: 1px solid var(--border-color); }
    .site-name-small { font-size: 1rem; font-weight: 700; color: var(--accent-main); }
    .kp-badge { background: #FFF0F1; color: var(--kp-color); padding: 6px 14px; border-radius: 20px; font-weight: 700; border: 1px solid #FFD6D9; font-size: 0.85rem; }
    .header { padding: 20px 30px 10px; text-align: center; }
    .site-name { font-size: 1.75rem; font-weight: 700; color: var(--accent-main); }
    .content { padding: 30px; }
    .instruction { font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 20px; }

    .chapter-select { width: 100%; padding: 15px; border: 1px solid var(--border-color); border-radius: 8px; font-family: var(--font-family); font-size: 1rem; color: var(--text-primary); background-color: var(--secondary-bg); cursor: pointer; margin-bottom: 30px; appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2334495E%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 15px top 50%; background-size: 12px auto; transition: border-color 0.2s; }
    .chapter-select:focus { outline: none; border-color: var(--accent-main); background-color: var(--primary-bg); }

    .footer-actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 20px; }
    .btn { padding: 12px 24px; font-size: 0.95rem; font-weight: 600; border-radius: 6px; cursor: pointer; border: none; text-decoration: none; }
    .btn-back { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); }
    .btn-primary { background-color: var(--accent-main); color: var(--primary-bg); }
    .btn-primary:hover { background-color: var(--accent-hover); }
    .btn-primary:disabled { background-color: #A0AAB5; cursor: not-allowed; }
</style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <span class="site-name-small">Brevity Companion</span>
            <div class="kp-badge">🪙 <span id="kp-display">0</span> KP</div>
        </div>
        <header class="header">
            <h1 class="site-name">Practice Mode</h1>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px;">Structured drills for a specific chapter</p>
        </header>

        <div class="content">
            <p class="instruction">Select the chapter you want to practice. The AI tutor will focus strictly on the grammar and vocabulary introduced in this lesson.</p>

            <select id="chapter-dropdown" class="chapter-select" onchange="checkSelection()">
                <option value="" disabled selected>Select a chapter to begin...</option>
            </select>

            <div class="footer-actions">
                <a href="dashboard.html" class="btn btn-back">⟵ Back to Modes</a>
                <button class="btn btn-primary" id="btn-start" disabled onclick="startPractice()">Start Audio Drills</button>
            </div>
        </div>
    </div>

    <script>
        const dropdown = document.getElementById('chapter-dropdown');
        const startBtn = document.getElementById('btn-start');
        const kpBalance = parseInt(localStorage.getItem('kimchi_points') || '0');
        document.getElementById('kp-display').innerText = kpBalance;

        for (let i = 1; i <= 40; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `Chapter ${i}`;
            dropdown.appendChild(option);
        }

        function checkSelection() {
            startBtn.disabled = dropdown.value === "";
        }

        function startPractice() {
            if (kpBalance < 10) {
                alert("Not enough Kimchi Points. Please top up in the store.");
                window.location.href = "dashboard.html";
                return;
            }
            const selectedChapter = dropdown.value;

            localStorage.setItem('kimchi_points', kpBalance - 10);
            localStorage.setItem('brevity_pending_session', JSON.stringify({
                mode: "practice",
                chapter: parseInt(selectedChapter, 10)
            }));

            window.location.href = "connect.html";
        }
    </script>
</body>
</html>
