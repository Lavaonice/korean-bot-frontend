<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brevity Companion - Casual Setup</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
    // Auth gate — protected page. Validates the real Supabase session.
    requireAuth();
</script>
<style>
    :root {
        --primary-bg: #FFFFFF; --secondary-bg: #F5F5F5;
        --text-primary: #111111; --text-secondary: #555555;
        --accent-main: #111111; --accent-hover: #333333;
        --border-color: #E1E1E1; --kp-color: #E63946;
        --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-family); color: var(--text-primary); background-color: var(--secondary-bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
    .container { width: 100%; max-width: 650px; background-color: var(--primary-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 30px; border-bottom: 1px solid var(--border-color); }
    .site-name-small { font-size: 1rem; font-weight: 700; color: var(--accent-main); }
    .kp-badge { background: #FFF0F1; color: var(--kp-color); padding: 6px 14px; border-radius: 20px; font-weight: 700; border: 1px solid #FFD6D9; font-size: 0.85rem; }
    .header { padding: 20px 30px 10px; text-align: center; }
    .site-name { font-size: 1.75rem; font-weight: 700; color: var(--accent-main); }
    .content { padding: 30px; }
    .instruction { font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 20px; }

    .topic-input { width: 100%; height: 120px; padding: 15px; border: 1px solid var(--border-color); border-radius: 8px; font-family: var(--font-family); font-size: 0.95rem; resize: vertical; margin-bottom: 30px; transition: border-color 0.2s; background-color: var(--secondary-bg); }
    .topic-input:focus { outline: none; border-color: var(--accent-main); background-color: var(--primary-bg); }

    .footer-actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 20px; }
    .btn { padding: 12px 24px; font-size: 0.95rem; font-weight: 600; border-radius: 6px; cursor: pointer; border: none; text-decoration: none; }
    .btn-back { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); }
    .btn-primary { background-color: var(--accent-main); color: var(--primary-bg); }
    .btn-primary:hover { background-color: var(--accent-hover); }

    /* Responsive: tablet */
    @media (max-width: 768px) {
        body { padding: 20px 12px; }
        .container { max-width: 100%; }
        .top-bar { padding: 14px 18px; }
        .content { padding: 22px 18px; }
        .header { padding: 18px 18px 8px; }
        .site-name { font-size: 1.5rem; }
    }
    /* Responsive: mobile */
    @media (max-width: 480px) {
        body { padding: 12px 8px; }
        .top-bar { padding: 12px 14px; }
        .site-name-small { font-size: 0.9rem; }
        .kp-badge { font-size: 0.78rem; padding: 5px 11px; }
        .header { padding: 14px 14px 6px; }
        .site-name { font-size: 1.35rem; }
        .content { padding: 18px 14px; }
        .topic-input { height: 100px; }
        .footer-actions { flex-direction: column-reverse; gap: 12px; }
        .btn { width: 100%; text-align: center; }
    }
</style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <span class="site-name-small">Brevity Companion</span>
            <div class="kp-badge">🪙 <span id="kp-display">0</span> KP</div>
        </div>
        <header class="header">
            <h1 class="site-name">Casual Mode</h1>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px;">Freestyle conversation practice</p>
        </header>

        <div class="content">
            <p class="instruction">Is there a specific topic, scenario, or vocabulary you'd like to talk about today? (Optional)</p>

            <textarea id="topic-area" class="topic-input" placeholder="e.g., Let's practice ordering food at a restaurant, or ask me questions about my weekend..."></textarea>

            <div class="footer-actions">
                <a href="dashboard.html" class="btn btn-back">⟵ Back to Modes</a>
                <button class="btn btn-primary" id="btn-start" onclick="startCasual()">Start Audio Chat</button>
            </div>
        </div>
    </div>

    <script>
        const kpBalance = parseInt(localStorage.getItem('kimchi_points') || '0');
        document.getElementById('kp-display').innerText = kpBalance;

        function startCasual() {
            if (kpBalance < 10) {
                alert("Not enough Kimchi Points. Please top up in the store.");
                window.location.href = "dashboard.html";
                return;
            }
            const topic = document.getElementById('topic-area').value.trim();

            // Deduct KP now, at the moment the session actually starts.
            localStorage.setItem('kimchi_points', kpBalance - 10);

            // Hand the session config off to the voice canvas.
            localStorage.setItem('brevity_pending_session', JSON.stringify({
                mode: "casual",
                topic: topic || null
            }));

            window.location.href = "connect.html";
        }
    </script>
</body>
</html>
